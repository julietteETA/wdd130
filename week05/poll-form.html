<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale = 1.0 ">
    <title> Form Creation </title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1> WDD 130|HTML FORM - User Poll</h1>
    </header>
    <main>
        <form>
            <div class="form-item" class="column2">
                <label for="fullname"> Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-item" class="column2"><label for="useremail"> Email:</label>
                <input type="email" id="useremail" name="useremail" required>
            </div>


            <div class="form-item" class="column1">
                <label for="quantity"> Select Quantity </label>
                <select name="quantity" id="quantity">
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
            <div class="form-item" class="column1"> <label for="browser"> What is your favorite
                    internet
                    browser?</label>
                <select name="browser" id="browser">
                    <option value="Chrome">Chrome</option>
                    <option value="Safari"> Safari</option>
                    <option value="Edge">Edge</option>
                    <option value="Brave">Brave</option>
                    <option value="Other">Other</option>
                </select>
            </div>


            </div>
            <div class="form-item" class=" column1"><label for="pet"> Do you have a household
                    pet?</label>
                <input type="checkbox" id="pet" name="pet">
            </div>


            <div class="form-item"><label for="feedback"> List the places you have lived.</label>
                <textarea name="feedback" id="feedback" rows="4"
                  placeholder="Stillwater Florida, Amsterdam Netherlands, Tumbuktu"></textarea>
            </div>

            <div class="form-item column2"><label for="feedback"> List the places you have
                    lived.</label>
                <textarea name="feedback" id="feedback" rows="4"
                  placeholder="Stillwater Florida, Amsterdam Netherlands, Tumbuktu"></textarea>
            </div>

            <div class="form-item"><button type="submit">Submit Poll</button></div>

        </form>

    </main>
    <footer>@2026|HTML Form-User Poll activity|Juliette Phemba</footer>

</body>

</html>
