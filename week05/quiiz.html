<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title> Quizz</title>
        <link rel="stylesheet" href="styles/quiz.css">



    </head>

    <body>
        <header>
            <h1> Respond to the question</h1>
        </header>
        <main>
            <form action="">
                <label for="blank">Fill in the blank</label>
                <input type="text" id="q1" name="q1" required>

                <label for="answer"> Short answer question</label>
                <input type="textarea" id="q2" name="q2">

                <label for="select"> Select dropdown or combo box</label>
                <select name="q3" id="q3">
                    <option value="1">Dropdown </option>
                    <option value="2">Combo box</option>
                    <option value=""> Choose One...</option>
                </select>

                <label for="number">Number</label>
                <input type="number" name="q4" id="q4">

                <button type="submit">Submit Quiz</button>

            </form>
        </main>
        <footer>@2026|HTML Form-Quiz activity|Juliette-Phemba</footer> 
    </body>

    

</html>
